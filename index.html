<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        @import 'daisyui';
        * { font-family: "Geist", sans-serif; }
        /* Custom border-top logic for issues */
        .border-open { border-top: 4px solid #22c55e !important; }
        .border-closed { border-top: 4px solid #a855f7 !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <section id="login-page" class="flex items-center justify-center min-h-screen p-4">
        <div class="card w-full max-w-md bg-white shadow-2xl p-8 border border-gray-100 text-center">
            <div class="flex justify-center mb-6">
                <img src="./assets/github-logo.png" alt="Logo" class="w-20 h-20">
            </div>
            <h1 class="text-3xl font-bold text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-gray-500 mb-8 mt-2">Sign in to manage your project issues</p>

            <div class="space-y-4 text-left">
                <div class="form-control">
                    <label class="label font-semibold">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full" />
                    <span class="text-xs text-indigo-600 mt-1 font-medium">Default: admin</span>
                </div>
                <div class="form-control">
                    <label class="label font-semibold">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full" />
                    <span class="text-xs text-indigo-600 mt-1 font-medium">Default: admin123</span>
                </div>
                <button id="login-btn" class="btn btn-primary w-full bg-indigo-600 border-none text-white mt-4">Sign In</button>
            </div>
        </div>
    </section>

    <section id="dashboard" class="hidden">
        <nav class="navbar bg-white shadow-sm px-4 md:px-12 border-b">
            <div class="flex-1 gap-2">
                <img src="./assets/github-logo.png" class="w-8 h-8">
                <span class="font-bold text-xl hidden md:block">GitHub Issues Tracker</span>
            </div>
            <div class="flex-none gap-2">
                <div class="join">
                    <input id="search-input" class="input input-bordered join-item w-32 md:w-64" placeholder="Search issues..."/>
                    <button id="search-btn" class="btn btn-primary join-item bg-indigo-600 border-none text-white">Search</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 md:p-10">
            <div class="flex justify-start gap-4 mb-10">
                <div class="tabs tabs-box bg-gray-200 p-1 rounded-xl">
                    <button class="tab tab-active px-8 py-2 rounded-lg bg-indigo-600 text-white" data-filter="all">All</button>
                    <button class="tab px-8 py-2" data-filter="open">Open</button>
                    <button class="tab px-8 py-2" data-filter="closed">Closed</button>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <div class="flex items-center gap-3">
                    <div class="p-3 bg-indigo-100 rounded-lg"><i class="fa-solid fa-list-check text-indigo-600 text-xl"></i></div>
                    <div>
                        <h2 class="text-2xl font-bold"><span id="issue-count">0</span> Issues</h2>
                        <p class="text-sm text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-6 text-sm font-bold">
                    <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-green-500"></span> Open</span>
                    <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-purple-500"></span> Closed</span>
                </div>
            </div>

            <div id="loader" class="flex justify-center py-20 hidden">
                <span class="loading loading-spinner loading-xl text-indigo-600"></span>
            </div>

            <div id="issues-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </main>
    </section>

     <dialog id="issue_modal" class="modal">
        <div class="modal-box w-11/12 max-w-2xl">
            <div id="modal-content"></div>
            <div class="modal-action">
                <form method="dialog"><button class="btn bg-indigo-600 text-white border-none px-10">Close</button></form>
            </div>
        </div>
    </dialog>

   

   

    <script src="index.js"></script>
</body>
</html>
